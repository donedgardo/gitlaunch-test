name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: echo "Install your dependencies here"

      - name: Quality checks
        run: echo "Run your linter here"

      - name: Run tests
        run: echo "Run your tests here"

      - name: Build
        run: echo "Build your project here"

      - name: Report build to GitLaunch
        if: github.ref == 'refs/heads/main'
        uses: donedgardo/build-reporter@v2
        with:
          api-key: ${{ secrets.GITLAUNCH_API_KEY }}
          service-id: ${{ vars.GITLAUNCH_SERVICE_ID }}
          action: report-build
          build-id: ${{ github.sha }}
